name: Tests

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        php: [8.5]
        dependency-version: [prefer-lowest, prefer-stable]

    name: Tests P${{ matrix.php }} - ${{ matrix.os }} - ${{ matrix.dependency-version }}

    steps:

    - name: Checkout
      uses: actions/checkout@v6.0.3

    - name: Setup PHP
      uses: shivammathur/setup-php@2.37.2
      with:
        php-version: ${{ matrix.php }}
        extensions: dom, mbstring, zip, fileinfo
        coverage: pcov

    - name: Get Composer cache directory
      id: composer-cache
      shell: bash
      run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

    - name: Cache dependencies
      uses: actions/cache@v6
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: dependencies-php-${{ matrix.php }}-os-${{ matrix.os }}-version-${{ matrix.dependency-version }}-composer-${{ hashFiles('composer.json') }}
        restore-keys: dependencies-php-${{ matrix.php }}-os-${{ matrix.os }}-version-${{ matrix.dependency-version }}-composer-

    - name: Install Composer dependencies
      run: composer update --${{ matrix.dependency-version }} --no-interaction --prefer-dist

    - name: Unit Tests
      run: composer test:unit

  mutation:
    runs-on: ubuntu-latest

    name: Mutation Tests P8.5

    steps:

    - name: Checkout
      uses: actions/checkout@v6.0.3

    - name: Setup PHP
      uses: shivammathur/setup-php@2.37.2
      with:
        php-version: 8.5
        extensions: dom, mbstring, zip, fileinfo
        coverage: pcov

    - name: Get Composer cache directory
      id: composer-cache
      shell: bash
      run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

    - name: Cache dependencies
      uses: actions/cache@v6
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: dependencies-php-8.5-os-ubuntu-latest-version-prefer-stable-composer-${{ hashFiles('composer.json') }}
        restore-keys: dependencies-php-8.5-os-ubuntu-latest-version-prefer-stable-composer-

    - name: Install Composer dependencies
      run: composer update --prefer-stable --no-interaction --prefer-dist

    - name: Mutation Tests
      run: composer test:mutate
