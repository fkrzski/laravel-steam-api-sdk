name: Docs

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    name: Validate docs - ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v7.0.1

    - name: Setup Node.js
      uses: actions/setup-node@v7.0.0
      with:
        node-version: 24

    # Validates docs/ against the shared @fkrzski/docs-schema contract:
    # frontmatter (title + SEO-bounded description, project fields), markdownlint,
    # and internal-link resolution. Exits non-zero on any violation.
    - name: Validate docs
      run: npx --yes @fkrzski/docs-schema docs
