name: Formats

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    name: Formats P8.5 - ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v6.0.3

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: 8.5
        extensions: dom, mbstring, zip, fileinfo
        coverage: pcov

    - name: Get Composer cache directory
      id: composer-cache
      shell: bash
      run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

    - name: Cache dependencies
      uses: actions/cache@v5
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: dependencies-php-8.5-os-ubuntu-latest-composer-${{ hashFiles('composer.json') }}
        restore-keys: dependencies-php-8.5-os-ubuntu-latest-composer-

    - name: Cache static analysis tools
      uses: actions/cache@v5
      with:
        path: .cache
        key: tools-php-8.5-os-ubuntu-latest-${{ github.run_id }}
        restore-keys: tools-php-8.5-os-ubuntu-latest-

    - name: Install Composer dependencies
      run: composer update --prefer-stable --no-interaction --prefer-dist

    - name: Profanity Checks
      run: composer test:profanity

    - name: Coding Style Checks
      run: composer test:lint

    - name: Type Checks
      run: composer test:types

    - name: Type Coverage Checks
      run: composer test:type-coverage
